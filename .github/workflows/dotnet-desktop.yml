name: Anything .NET 10 Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: Anything.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=${{ matrix.configuration }}

    - name: Build
      run: msbuild $env:Solution_Name /p:Configuration=${{ matrix.configuration }}

    - name: Publish WPF App
      run: dotnet publish Anything.UI.Wpf/Anything.UI.Wpf.csproj -c ${{ matrix.configuration }} -o publish

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Anything-${{ matrix.configuration }}
        path: publish
